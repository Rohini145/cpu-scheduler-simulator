<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPU Scheduler Simulator - Complete Energy Comparison</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Poppins:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 50%, #16213e 100%);
            color: #e0e0e0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1500px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #4a9eff 0%, #4fffe6 50%, #ff6b9d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
        }

        .subtitle {
            color: #a0a0b0;
            font-size: 1rem;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 30px;
        }

        .panel {
            background: rgba(30, 30, 50, 0.6);
            border: 2px solid rgba(74, 158, 255, 0.2);
            border-radius: 16px;
            padding: 28px;
            backdrop-filter: blur(10px);
        }

        .panel h2 {
            color: #4a9eff;
            font-size: 1.4rem;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            color: #b0b0c0;
            font-size: 0.85rem;
            margin-bottom: 8px;
        }

        input, select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(50, 50, 80, 0.6);
            color: #fff;
            border: 2px solid rgba(74, 158, 255, 0.2);
            border-radius: 8px;
            font-size: 0.95rem;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 14px 20px;
            background: linear-gradient(135deg, #4a9eff 0%, #2b7fd9 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(74, 158, 255, 0.4);
        }

        button.secondary {
            background: rgba(74, 158, 255, 0.15);
            border: 2px solid rgba(74, 158, 255, 0.4);
            color: #4a9eff;
        }

        .process-list {
            max-height: 240px;
            overflow-y: auto;
            margin: 16px 0;
            padding: 12px;
            background: rgba(50, 50, 80, 0.3);
            border-radius: 8px;
        }

        .process-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, rgba(74, 158, 255, 0.15) 0%, rgba(79, 255, 198, 0.05) 100%);
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            border-left: 4px solid #4a9eff;
        }

        .process-item button {
            padding: 6px 12px;
            font-size: 0.8rem;
            background: rgba(220, 100, 100, 0.6);
            flex: 0 0 auto;
        }

        .results-section {
            display: none;
            animation: fadeIn 0.6s ease-out;
        }

        .results-section.visible {
            display: block;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .gantt-container {
            background: rgba(50, 50, 80, 0.4);
            padding: 20px;
            border-radius: 12px;
            overflow-x: auto;
            margin-bottom: 20px;
        }

        .gantt-row {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            gap: 12px;
        }

        .process-label {
            width: 50px;
            font-weight: 700;
            color: #4a9eff;
        }

        .gantt-timeline {
            flex: 1;
            position: relative;
            height: 40px;
            background: rgba(50, 50, 80, 0.5);
            border-radius: 6px;
            overflow: hidden;
        }

        .gantt-block {
            position: absolute;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            font-size: 0.85rem;
            border-radius: 4px;
            cursor: pointer;
        }

        .gantt-block.fcfs { background: linear-gradient(135deg, #4a9eff, #3a8eef); }
        .gantt-block.rr { background: linear-gradient(135deg, #7fd3ff, #5ab8ff); }
        .gantt-block.sjf { background: linear-gradient(135deg, #ff9f4a, #ff8a2b); }
        .gantt-block.priority { background: linear-gradient(135deg, #9f4aff, #8a2bff); }
        .gantt-block.energy { background: linear-gradient(135deg, #4aff7f, #2be560); }

        .timeline-marks {
            position: relative;
            height: 25px;
            margin-top: 5px;
        }

        .timeline-mark {
            position: absolute;
            font-size: 10px;
            color: #888;
            transform: translateX(-50%);
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .metric {
            background: linear-gradient(135deg, rgba(74, 158, 255, 0.15) 0%, rgba(79, 255, 198, 0.05) 100%);
            border: 2px solid rgba(74, 158, 255, 0.2);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .metric-label {
            color: #a0a0b0;
            font-size: 0.75rem;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .metric-value {
            color: #4fffe6;
            font-size: 2rem;
            font-weight: 700;
        }

        .comparison-table {
            margin-top: 20px;
        }

        .comparison-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .comparison-table th {
            background: linear-gradient(135deg, rgba(74, 158, 255, 0.3), rgba(79, 255, 198, 0.1));
            padding: 12px;
            text-align: center;
        }

        .comparison-table td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid rgba(74, 158, 255, 0.2);
        }

        .best-performer {
            background: rgba(79, 255, 198, 0.15);
            border: 1px solid #4fffe6;
        }

        .table-container {
            overflow-x: auto;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(74, 158, 255, 0.2);
        }

        th {
            color: #4a9eff;
            background: rgba(74, 158, 255, 0.1);
        }

        .empty-state {
            text-align: center;
            color: #808090;
            padding: 24px;
        }

        .config-box {
            background: linear-gradient(135deg, rgba(79, 255, 198, 0.1) 0%, rgba(74, 158, 255, 0.05) 100%);
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 12px;
            border-left: 4px solid #4fffe6;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>CPU SCHEDULER SIMULATOR</h1>
            <p class="subtitle">Complete Energy Comparison - All Algorithms Calculate Energy</p>
        </header>

        <div class="main-grid">
            <div class="panel">
                <h2>Add Processes</h2>
                <div class="form-group">
                    <label>Process ID</label>
                    <input type="text" id="processId" placeholder="P1, P2, P3...">
                </div>
                <div class="form-group">
                    <label>Arrival Time (seconds)</label>
                    <input type="number" id="arrivalTime" value="0" min="0">
                </div>
                <div class="form-group">
                    <label>Burst Time (seconds)</label>
                    <input type="number" id="burstTime" value="4" min="1">
                </div>
                <div class="form-group">
                    <label>Priority (0=highest, for Priority algorithm)</label>
                    <input type="number" id="priority" value="0" min="0">
                </div>
                <button onclick="addProcess()">Add Process</button>
                <div class="process-list" id="processList">
                    <div class="empty-state">No processes yet</div>
                </div>
                <div class="button-group">
                    <button onclick="runSimulation()">Simulate</button>
                    <button class="secondary" onclick="resetAll()">Reset</button>
                </div>
            </div>

            <div class="panel">
                <h2>Configuration</h2>
                <div id="configInfo" class="config-box">
                    Select an algorithm from dropdown and click Simulate
                </div>
                
                <div class="form-group">
                    <label>Time Quantum (seconds) - for Round Robin Algorithm</label>
                    <input type="number" id="quantumValue" value="4" min="1">
                </div>
                
                <div class="form-group">
                    <label>Select Algorithm</label>
                    <select id="algorithmSelect">
                        <option value="fcfs">FCFS (First Come First Served)</option>
                        <option value="sjf">SJF (Shortest Job First)</option>
                        <option value="priority">Priority Scheduling (0=Highest)</option>
                        <option value="rr">Round Robin</option>
                        <option value="energy">Energy-Aware Scheduling</option>
                        <option value="compare">COMPARE ALL ALGORITHMS</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="resultsSection" class="results-section">
            <div class="panel full-width">
                <h2>Gantt Chart</h2>
                <div class="gantt-container" id="ganttChart"></div>
            </div>

            <div class="metrics-grid" id="metricsGrid"></div>

            <div class="panel full-width">
                <h2>Process Details</h2>
                <div class="table-container">
                    <table id="detailsTable">
                        <thead id="tableHeader"></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="comparisonSection" class="results-section">
            <div class="panel full-width comparison-table">
                <h2>All Algorithms Comparison (All Calculate Energy)</h2>
                <div id="comparisonContent"></div>
            </div>
        </div>
    </div>

    <script>
        let processes = [];

        // Function to calculate energy for a process based on its burst time
        function calculateEnergy(procs) {
            let totalEnergy = 0;
            for (let p of procs) {
                let useHP = p.burst <= 4;
                let energyRate = useHP ? 5 : 2;
                totalEnergy += p.burst * energyRate;
            }
            return totalEnergy;
        }

        function addProcess() {
            const id = document.getElementById('processId').value.trim();
            const arrival = parseInt(document.getElementById('arrivalTime').value) || 0;
            const burst = parseInt(document.getElementById('burstTime').value) || 0;
            const priority = parseInt(document.getElementById('priority').value) || 0;

            if (!id || burst <= 0) {
                alert('Please enter valid process ID and burst time');
                return;
            }
            if (processes.some(p => p.id === id)) {
                alert('Process ID already exists');
                return;
            }
            processes.push({ id, arrival, burst, priority });
            updateProcessList();
            document.getElementById('processId').value = '';
            document.getElementById('arrivalTime').value = '0';
            document.getElementById('burstTime').value = '';
            document.getElementById('priority').value = '0';
        }

        function updateProcessList() {
            const list = document.getElementById('processList');
            if (processes.length === 0) {
                list.innerHTML = '<div class="empty-state">No processes yet</div>';
                return;
            }
            list.innerHTML = processes.map((p, i) => `
                <div class="process-item">
                    <span><strong>${p.id}</strong> | Arrival: ${p.arrival}s | Burst: ${p.burst}s | Priority: ${p.priority}</span>
                    <button onclick="removeProcess(${i})">Remove</button>
                </div>
            `).join('');
        }

        function removeProcess(i) {
            processes.splice(i, 1);
            updateProcessList();
        }

        function updateAlgorithmInfo() {
            const algo = document.getElementById('algorithmSelect').value;
            
            let info = '';
            if (algo === 'fcfs') info = 'First Come First Served - Processes executed in arrival order.';
            else if (algo === 'sjf') info = 'Shortest Job First - Shortest burst time executes first.';
            else if (algo === 'priority') info = 'Priority Scheduling - Lower number = Higher priority (0 is highest).';
            else if (algo === 'rr') info = 'Round Robin - Each process gets a fixed time quantum.';
            else if (algo === 'energy') info = 'Energy-Aware - Intelligent HP/LP switching to optimize energy.';
            else if (algo === 'compare') info = 'Compare All Algorithms - Shows all 5 algorithms with energy calculations.';
            
            document.getElementById('configInfo').innerHTML = info;
        }

        // Calculate energy for a list of results (same HP/LP logic for all algorithms)
        function calculateTotalEnergyForResults(results) {
            let totalEnergy = 0;
            for (let r of results) {
                let useHP = r.burst <= 4;
                let energyRate = useHP ? 5 : 2;
                totalEnergy += r.burst * energyRate;
            }
            return totalEnergy;
        }

        // Scheduling Algorithms (ALL now include energy calculation)
        function scheduleFCFS(procs) {
            const sorted = [...procs].sort((a, b) => a.arrival - b.arrival);
            let time = 0, timeline = [], results = [];
            for (let p of sorted) {
                if (time < p.arrival) time = p.arrival;
                timeline.push({ id: p.id, mode: 'fcfs', start: time, end: time + p.burst, duration: p.burst });
                results.push({ id: p.id, arrival: p.arrival, burst: p.burst, start: time, finish: time + p.burst, waiting: time - p.arrival, turnaround: (time + p.burst) - p.arrival });
                time += p.burst;
            }
            // Add energy calculation
            let totalEnergy = calculateTotalEnergyForResults(results);
            return { timeline, results, totalEnergy };
        }

        function scheduleSJF(procs) {
            let remaining = procs.map(p => ({ ...p, remaining: p.burst, done: false }));
            let time = 0, timeline = [], results = [], completed = 0;
            while (completed < procs.length) {
                let available = remaining.filter(p => p.arrival <= time && !p.done);
                if (available.length === 0) {
                    time = Math.min(...remaining.filter(p => !p.done).map(p => p.arrival));
                    continue;
                }
                available.sort((a, b) => a.remaining - b.remaining);
                let p = available[0];
                timeline.push({ id: p.id, mode: 'sjf', start: time, end: time + p.remaining, duration: p.remaining });
                results.push({ id: p.id, arrival: p.arrival, burst: p.burst, start: time, finish: time + p.remaining, waiting: time - p.arrival, turnaround: (time + p.remaining) - p.arrival });
                time += p.remaining;
                p.done = true;
                completed++;
            }
            let totalEnergy = calculateTotalEnergyForResults(results);
            return { timeline, results, totalEnergy };
        }

        function schedulePriority(procs) {
            let remaining = procs.map(p => ({ ...p, remaining: p.burst, done: false }));
            let time = 0, timeline = [], results = [], completed = 0;
            while (completed < procs.length) {
                let available = remaining.filter(p => p.arrival <= time && !p.done);
                if (available.length === 0) {
                    time = Math.min(...remaining.filter(p => !p.done).map(p => p.arrival));
                    continue;
                }
                available.sort((a, b) => a.priority - b.priority);
                let p = available[0];
                timeline.push({ id: p.id, mode: 'priority', start: time, end: time + p.remaining, duration: p.remaining });
                results.push({ id: p.id, arrival: p.arrival, burst: p.burst, priority: p.priority, start: time, finish: time + p.remaining, waiting: time - p.arrival, turnaround: (time + p.remaining) - p.arrival });
                time += p.remaining;
                p.done = true;
                completed++;
            }
            let totalEnergy = calculateTotalEnergyForResults(results);
            return { timeline, results, totalEnergy };
        }

        function scheduleRoundRobin(procs, quantum) {
            let remaining = procs.map(p => ({ id: p.id, arrival: p.arrival, burst: p.burst, remaining: p.burst }));
            remaining.sort((a, b) => a.arrival - b.arrival);
            let time = 0, timeline = [], queue = [], idx = 0, startTimes = {}, finishTimes = {};
            
            while (idx < remaining.length || queue.length > 0) {
                while (idx < remaining.length && remaining[idx].arrival <= time) {
                    queue.push(remaining[idx]);
                    idx++;
                }
                if (queue.length === 0 && idx < remaining.length) {
                    time = remaining[idx].arrival;
                    continue;
                }
                let p = queue.shift();
                if (startTimes[p.id] === undefined) startTimes[p.id] = time;
                let exec = Math.min(p.remaining, quantum);
                timeline.push({ id: p.id, mode: 'rr', start: time, end: time + exec, duration: exec });
                time += exec;
                p.remaining -= exec;
                while (idx < remaining.length && remaining[idx].arrival <= time) {
                    queue.push(remaining[idx]);
                    idx++;
                }
                if (p.remaining > 0) {
                    queue.push(p);
                } else {
                    finishTimes[p.id] = time;
                }
            }
            
            let results = [];
            for (let p of procs) {
                let turnaround = finishTimes[p.id] - p.arrival;
                let waiting = turnaround - p.burst;
                results.push({ id: p.id, arrival: p.arrival, burst: p.burst, start: startTimes[p.id], finish: finishTimes[p.id], waiting: waiting, turnaround: turnaround });
            }
            let totalEnergy = calculateTotalEnergyForResults(results);
            return { timeline, results, totalEnergy };
        }

        function scheduleEnergyAware(procs) {
            const sorted = [...procs].sort((a, b) => a.arrival - b.arrival);
            let time = 0, timeline = [], results = [];
            for (let p of sorted) {
                if (time < p.arrival) time = p.arrival;
                let useHP = p.burst <= 4;
                let energy = p.burst * (useHP ? 5 : 2);
                timeline.push({ id: p.id, mode: 'energy', start: time, end: time + p.burst, duration: p.burst, energy: energy });
                results.push({ id: p.id, arrival: p.arrival, burst: p.burst, start: time, finish: time + p.burst, waiting: time - p.arrival, turnaround: (time + p.burst) - p.arrival, energy: energy });
                time += p.burst;
            }
            let totalEnergy = results.reduce((sum, r) => sum + r.energy, 0);
            return { timeline, results, totalEnergy };
        }

        function displayResults(timeline, results, algoName, totalEnergy) {
            const totalTime = Math.max(...results.map(r => r.finish));
            const avgWait = results.reduce((s, r) => s + r.waiting, 0) / results.length;
            const avgTurn = results.reduce((s, r) => s + r.turnaround, 0) / results.length;

            let metricsHTML = `
                <div class="metric"><div class="metric-label">Total Time</div><div class="metric-value">${totalTime.toFixed(2)}s</div></div>
                <div class="metric"><div class="metric-label">Avg Waiting</div><div class="metric-value">${avgWait.toFixed(2)}s</div></div>
                <div class="metric"><div class="metric-label">Avg Turnaround</div><div class="metric-value">${avgTurn.toFixed(2)}s</div></div>
                <div class="metric"><div class="metric-label">Context Switches</div><div class="metric-value">${timeline.length - 1}</div></div>
                <div class="metric"><div class="metric-label">Total Energy</div><div class="metric-value">${totalEnergy.toFixed(2)} units</div></div>
            `;
            document.getElementById('metricsGrid').innerHTML = metricsHTML;

            const maxTime = totalTime;
            let ganttHTML = '';
            const processMap = new Map();
            timeline.forEach(item => {
                if (!processMap.has(item.id)) processMap.set(item.id, []);
                processMap.get(item.id).push(item);
            });
            
            for (let [id, blocks] of processMap) {
                let rowHTML = `<div class="gantt-row"><div class="process-label">${id}</div><div class="gantt-timeline">`;
                for (let block of blocks) {
                    const left = (block.start / maxTime) * 100;
                    const width = ((block.end - block.start) / maxTime) * 100;
                    rowHTML += `<div class="gantt-block ${block.mode}" style="left: ${left}%; width: ${width}%;">${block.id}</div>`;
                }
                rowHTML += `</div></div>`;
                ganttHTML += rowHTML;
            }
            
            let timelineMarks = '<div class="timeline-marks">';
            let interval = Math.ceil(maxTime / 10);
            for (let i = 0; i <= maxTime; i += interval) {
                let pos = (i / maxTime) * 100;
                timelineMarks += `<div class="timeline-mark" style="left: ${pos}%;">${i}s</div>`;
            }
            timelineMarks += '</div>';
            ganttHTML += timelineMarks;
            document.getElementById('ganttChart').innerHTML = ganttHTML;

            let headers = ['Process', 'Arrival', 'Burst', 'Start', 'Finish', 'Waiting', 'Turnaround'];
            if (algoName === 'priority') headers = ['Process', 'Arrival', 'Burst', 'Priority', 'Start', 'Finish', 'Waiting', 'Turnaround'];
            if (algoName === 'energy') headers.push('Energy');
            
            document.getElementById('tableHeader').innerHTML = `<tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr>`;
            let tableBody = '';
            for (let r of results) {
                if (algoName === 'priority') {
                    tableBody += `<tr>
                        <td>${r.id}</td>
                        <td>${r.arrival}</td>
                        <td>${r.burst}</td>
                        <td>${r.priority}</td>
                        <td>${r.start.toFixed(2)}</td>
                        <td>${r.finish.toFixed(2)}</td>
                        <td>${r.waiting.toFixed(2)}</td>
                        <td>${r.turnaround.toFixed(2)}</td>
                    </tr>`;
                } else if (algoName === 'energy') {
                    tableBody += `<tr>
                        <td>${r.id}</td>
                        <td>${r.arrival}</td>
                        <td>${r.burst}</td>
                        <td>${r.start.toFixed(2)}</td>
                        <td>${r.finish.toFixed(2)}</td>
                        <td>${r.waiting.toFixed(2)}</td>
                        <td>${r.turnaround.toFixed(2)}</td>
                        <td>${r.energy.toFixed(2)}</td>
                    </tr>`;
                } else {
                    tableBody += `<tr>
                        <td>${r.id}</td>
                        <td>${r.arrival}</td>
                        <td>${r.burst}</td>
                        <td>${r.start.toFixed(2)}</td>
                        <td>${r.finish.toFixed(2)}</td>
                        <td>${r.waiting.toFixed(2)}</td>
                        <td>${r.turnaround.toFixed(2)}</td>
                    </tr>`;
                }
            }
            document.getElementById('tableBody').innerHTML = tableBody;
        }

        function compareAllAlgorithms() {
            if (processes.length === 0) {
                alert('Please add at least one process first');
                return;
            }
            
            const quantum = parseInt(document.getElementById('quantumValue').value) || 4;
            
            let fcfsResult = scheduleFCFS(processes);
            let sjfResult = scheduleSJF(processes);
            let priorityResult = schedulePriority(processes);
            let rrResult = scheduleRoundRobin(processes, quantum);
            let energyResult = scheduleEnergyAware(processes);
            
            let comparisonData = [
                { name: 'FCFS', results: fcfsResult.results, totalEnergy: fcfsResult.totalEnergy },
                { name: 'SJF', results: sjfResult.results, totalEnergy: sjfResult.totalEnergy },
                { name: 'Priority', results: priorityResult.results, totalEnergy: priorityResult.totalEnergy },
                { name: 'Round Robin', results: rrResult.results, totalEnergy: rrResult.totalEnergy },
                { name: 'Energy-Aware', results: energyResult.results, totalEnergy: energyResult.totalEnergy }
            ];
            
            let bestWait = Infinity, bestTurn = Infinity, bestTime = Infinity, bestEnergy = Infinity;
            let bestWaitAlgo = '', bestTurnAlgo = '', bestTimeAlgo = '', bestEnergyAlgo = '';
            
            for (let data of comparisonData) {
                let totalTime = Math.max(...data.results.map(r => r.finish));
                let avgWait = data.results.reduce((s, r) => s + r.waiting, 0) / data.results.length;
                let avgTurn = data.results.reduce((s, r) => s + r.turnaround, 0) / data.results.length;
                
                data.totalTime = totalTime;
                data.avgWait = avgWait;
                data.avgTurn = avgTurn;
                
                if (avgWait < bestWait) { bestWait = avgWait; bestWaitAlgo = data.name; }
                if (avgTurn < bestTurn) { bestTurn = avgTurn; bestTurnAlgo = data.name; }
                if (totalTime < bestTime) { bestTime = totalTime; bestTimeAlgo = data.name; }
                if (data.totalEnergy < bestEnergy) { bestEnergy = data.totalEnergy; bestEnergyAlgo = data.name; }
            }
            
            let comparisonHTML = `
                <div class="table-container">
                    <h3 style="margin-bottom: 15px; color: #4fffe6;">Using Quantum: ${quantum}s for Round Robin | Energy: HP(≤4s)=5u/s, LP(>4s)=2u/s</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>Algorithm</th>
                                <th>Total Time (s)</th>
                                <th>Avg Waiting (s)</th>
                                <th>Avg Turnaround (s)</th>
                                <th>Total Energy (units)</th>
                            </tr>
                        </thead>
                        <tbody>
            `;
            
            for (let data of comparisonData) {
                let isBestWait = data.name === bestWaitAlgo;
                let isBestTurn = data.name === bestTurnAlgo;
                let isBestTime = data.name === bestTimeAlgo;
                let isBestEnergy = data.name === bestEnergyAlgo;
                let rowClass = (isBestWait || isBestTurn || isBestTime || isBestEnergy) ? 'class="best-performer"' : '';
                
                comparisonHTML += `<tr ${rowClass}>
                    <td><strong>${data.name}</strong> ${(isBestWait || isBestTurn || isBestTime || isBestEnergy) ? '🏆' : ''}</td>
                    <td style="color: ${isBestTime ? '#4fffe6' : '#fff'}">${data.totalTime.toFixed(2)}s</td>
                    <td style="color: ${isBestWait ? '#4fffe6' : '#fff'}">${data.avgWait.toFixed(2)}s</td>
                    <td style="color: ${isBestTurn ? '#4fffe6' : '#fff'}">${data.avgTurn.toFixed(2)}s</td>
                    <td style="color: ${isBestEnergy ? '#4fffe6' : '#fff'}">${data.totalEnergy.toFixed(2)} units</td>
                </tr>`;
            }
            
            comparisonHTML += `
                        </tbody>
                    </table>
                </div>
                <div style="margin-top: 20px; padding: 20px; background: linear-gradient(135deg, rgba(79, 255, 198, 0.1), rgba(74, 158, 255, 0.05)); border-radius: 12px; border-left: 4px solid #4fffe6;">
                    <h3 style="color: #4fffe6; margin-bottom: 15px;">Best Performers</h3>
                    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px;">
                        <div><strong>Fastest Execution:</strong><br><span style="color: #4fffe6; font-size: 1.1rem;">${bestTimeAlgo}</span><br>${bestTime.toFixed(2)}s</div>
                        <div><strong>Lowest Waiting:</strong><br><span style="color: #4fffe6; font-size: 1.1rem;">${bestWaitAlgo}</span><br>${bestWait.toFixed(2)}s</div>
                        <div><strong>Best Turnaround:</strong><br><span style="color: #4fffe6; font-size: 1.1rem;">${bestTurnAlgo}</span><br>${bestTurn.toFixed(2)}s</div>
                        <div><strong>Most Energy Efficient:</strong><br><span style="color: #4fffe6; font-size: 1.1rem;">${bestEnergyAlgo}</span><br>${bestEnergy.toFixed(2)} units</div>
                    </div>
                </div>
            `;
            
            document.getElementById('comparisonContent').innerHTML = comparisonHTML;
            document.getElementById('comparisonSection').classList.add('visible');
            document.getElementById('resultsSection').classList.remove('visible');
            document.getElementById('comparisonSection').scrollIntoView({ behavior: 'smooth' });
        }

        function runSimulation() {
            if (processes.length === 0) {
                alert('Please add at least one process');
                return;
            }
            
            const algo = document.getElementById('algorithmSelect').value;
            
            if (algo === 'compare') {
                compareAllAlgorithms();
                return;
            }
            
            const quantum = parseInt(document.getElementById('quantumValue').value) || 4;
            let result;
            
            switch(algo) {
                case 'fcfs': result = scheduleFCFS(processes); break;
                case 'sjf': result = scheduleSJF(processes); break;
                case 'priority': result = schedulePriority(processes); break;
                case 'rr': result = scheduleRoundRobin(processes, quantum); break;
                case 'energy': result = scheduleEnergyAware(processes); break;
                default: result = scheduleFCFS(processes);
            }
            
            displayResults(result.timeline, result.results, algo, result.totalEnergy);
            document.getElementById('resultsSection').classList.add('visible');
            document.getElementById('comparisonSection').classList.remove('visible');
        }

        function resetAll() {
            processes = [];
            updateProcessList();
            document.getElementById('resultsSection').classList.remove('visible');
            document.getElementById('comparisonSection').classList.remove('visible');
        }

        document.getElementById('algorithmSelect').addEventListener('change', updateAlgorithmInfo);
        updateAlgorithmInfo();
    </script>
</body>
</html>
